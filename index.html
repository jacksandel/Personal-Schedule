<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Schedule Gantt</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --text:      #e8eaf0;
      --muted:     #6b7080;
      --accent:    #4f8ef7;
      --today:     rgba(79,142,247,.15);
      --week-line: rgba(255,255,255,.35);
      --month-line: rgba(79,142,247,.7);
      --row-h:     44px;
      --month-h:   28px;
      --header-h:  48px;
      --label-w:   260px;
      --cell-w:    48px;
      --radius:    6px;
      --font-main: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; height: 58px;
      border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    header h1 { font-size: 16px; font-weight: 600; letter-spacing: .02em; }
    #status {
      font-size: 12px; font-family: var(--font-mono); color: var(--muted);
      display: flex; align-items: center; gap: 8px;
    }
    #dot { width:7px; height:7px; border-radius:50%; background:#3ecf8e; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .controls {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 28px; border-bottom: 1px solid var(--border);
      flex-wrap: wrap; flex-shrink: 0;
    }
    .controls label { font-size: 12px; color: var(--muted); margin-right: 2px; }
    .controls input[type="date"] {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius);
      padding: 6px 10px; font-family: var(--font-mono); font-size: 12px; cursor: pointer;
    }
    .btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius);
      padding: 6px 14px; font-size: 12px; cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .btn:hover { border-color: var(--accent); background: rgba(79,142,247,.08); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color:#fff; font-weight:500; }
    .btn.primary:hover { background: #3a7de8; }

    #cat-filters { display:flex; gap:6px; flex-wrap:wrap; margin-left:auto; }
    .pill {
      border-radius:999px; padding:4px 12px;
      font-size:11px; font-weight:500; cursor:pointer;
      border:1.5px solid transparent;
      transition:opacity .15s,border-color .15s; opacity:.5;
    }
    .pill.active { opacity:1; border-color:rgba(255,255,255,.25); }

    #gantt-wrap { flex:1; overflow:auto; position:relative; }
    #gantt { display:grid; min-width:max-content; }

    /* Month banner */
    .g-month-corner {
      position:sticky; top:0; left:0; z-index:6;
      background:var(--surface);
      height:var(--month-h);
      border-right:1px solid var(--border);
      border-bottom:1px solid var(--border);
    }
    .g-month-strip {
      display:flex; position:sticky; top:0; z-index:5;
      background:var(--surface);
      border-bottom:1px solid var(--border);
      height:var(--month-h);
    }
    .g-month-block {
      display:flex; align-items:center; justify-content:center;
      border-left:3px solid var(--month-line);
      font-size:11px; font-weight:600; letter-spacing:.07em;
      text-transform:uppercase; color:var(--accent); overflow:hidden;
    }
    .g-month-block:first-child { border-left:none; }

    /* Day header */
    .g-header-label {
      position:sticky; top:var(--month-h); left:0; z-index:5;
      background:var(--surface); height:var(--header-h);
      border-right:1px solid var(--border); border-bottom:1px solid var(--border);
      display:flex; align-items:center; padding:0 16px;
      font-size:11px; font-weight:600; letter-spacing:.08em;
      text-transform:uppercase; color:var(--muted);
    }
    .g-header-dates {
      display:flex; position:sticky; top:var(--month-h); z-index:4;
      background:var(--surface); border-bottom:1px solid var(--border);
      height:var(--header-h);
    }
    .g-day-header {
      width:var(--cell-w); min-width:var(--cell-w);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      border-right:1px solid var(--border); gap:2px;
    }
    .g-day-header.month-start { border-left:3px solid var(--month-line); }
    .g-day-header.week-start  { border-left:3px solid var(--week-line); }
    .g-day-header .dow { font-size:10px; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
    .g-day-header .dom { font-size:15px; font-weight:600; font-family:var(--font-mono); }
    .g-day-header.today { background:var(--today); }
    .g-day-header.today .dom { color:var(--accent); }

    /* Rows */
    .g-row-label {
      position:sticky; left:0; z-index:2;
      background:var(--bg); height:var(--row-h);
      border-right:1px solid var(--border); border-bottom:1px solid var(--border);
      display:flex; align-items:center; padding:0 16px; gap:10px; cursor:default;
    }
    .g-row-label:hover { background:var(--surface); }
    .cat-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .g-event-name { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:190px; }
    .g-event-loc  { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:190px; }

    .g-row-cells {
      display:flex; border-bottom:1px solid var(--border);
      height:var(--row-h); position:relative;
    }
    .g-cell { width:var(--cell-w); min-width:var(--cell-w); border-right:1px solid var(--border); height:100%; }
    .g-cell.month-start { border-left:3px solid var(--month-line); }
    .g-cell.week-start  { border-left:3px solid var(--week-line); }
    .g-cell.today   { background:var(--today); }
    .g-cell.weekend { background:rgba(255,255,255,.015); }

    .g-bar {
      position:absolute; top:7px; bottom:7px;
      border-radius:4px; display:flex; align-items:center;
      padding:0 8px; font-size:11px; font-weight:500;
      white-space:nowrap; overflow:hidden; cursor:pointer;
      transition:filter .15s,transform .1s,box-shadow .15s; z-index:1;
      min-width:8px;
    }
    .g-bar:hover { filter:brightness(1.2); transform:scaleY(1.06); z-index:2; }
    .g-bar.selected { box-shadow:0 0 0 2px #fff, 0 0 0 4px var(--accent); z-index:3; filter:brightness(1.15); }
    .g-row-label.selected { background:var(--surface); outline:2px solid var(--accent); outline-offset:-2px; }
    .bar-label { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; pointer-events:none; width:100%; }

    #tooltip {
      position:fixed; background:#22263a;
      border:1px solid var(--border); border-radius:8px;
      padding:12px 16px; font-size:13px; max-width:260px;
      pointer-events:none; opacity:0; transition:opacity .15s;
      z-index:999; box-shadow:0 8px 32px rgba(0,0,0,.4); line-height:1.6;
    }
    #tooltip.visible { opacity:1; }
    #tooltip .tt-title { font-weight:600; font-size:14px; margin-bottom:6px; }
    #tooltip .tt-row { color:var(--muted); font-size:12px; }
    #tooltip .tt-row span { color:var(--text); }

    #message {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      flex:1; gap:12px; color:var(--muted); font-size:14px; text-align:center; padding:40px;
    }
    #message .big { font-size:36px; }

    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  </style>
</head>
<body>

<script>
  const SECRET_TOKEN = "jsschedule";  
const SCRIPT_URL  = "https://script.google.com/macros/s/AKfycbwn1u9aSHJ5jspUhaezKrgHZU6sGno07E6_dqVxbSem5TNqq0ZfdKfYS58Lst644XB9Nw/exec";

</script>
<!-- ══════════════════════════════════════════════════════════════ -->

<header>
  <h1>📅 Schedule</h1>
  <div id="status"><div id="dot"></div><span id="status-text">Connecting…</span></div>
</header>

<div class="controls">
  <label>From</label><input type="date" id="date-from"/>
  <label>To</label><input type="date" id="date-to"/>
  <button class="btn" onclick="shiftRange(-7)">◀ Week</button>
  <button class="btn" onclick="shiftRange(7)">Week ▶</button>
  <button class="btn primary" onclick="goToday()">Today</button>
  <div id="cat-filters"></div>
</div>

<div id="gantt-wrap">
  <div id="message"><div class="big">⏳</div>Loading your schedule…</div>
  <div id="gantt" style="display:none"></div>
</div>
<div id="tooltip"></div>

<script>
// ── CATEGORY COLORS ──────────────────────────────────────────────
const CATEGORY_COLORS = {
  "Internal":  { bg:"#2563eb", text:"#fff" },
  "External":  { bg:"#059669", text:"#fff" },
  "Personal":  { bg:"#7c3aed", text:"#fff" },
  "Travel":    { bg:"#d97706", text:"#fff" },
  "Deadline":  { bg:"#dc2626", text:"#fff" },
};
const AUTO_COLORS = ["#0e7490","#be185d","#15803d","#b45309","#6d28d9","#0f766e","#9333ea","#c2410c","#1d4ed8","#047857"];
let autoIdx = 0;
function categoryColor(cat) {
  const key = (cat||"").trim();
  if (!key) {
    if (!CATEGORY_COLORS["__none__"]) CATEGORY_COLORS["__none__"] = { bg:"#4b5563", text:"#fff" };
    return CATEGORY_COLORS["__none__"];
  }
  if (!CATEGORY_COLORS[key]) {
    CATEGORY_COLORS[key] = { bg: AUTO_COLORS[autoIdx % AUTO_COLORS.length], text:"#fff" };
    autoIdx++;
  }
  return CATEGORY_COLORS[key];
}

// ── STATE ─────────────────────────────────────────────────────────
let allEvents = [], activeCategories = new Set();
let rangeStart, rangeEnd, lastJSON = "";
const POLL_MS = 10000;

// ── DATE HELPERS ──────────────────────────────────────────────────
function parseDate(str) {
  if (!str) return null;
  if (str instanceof Date) return new Date(str.getFullYear(), str.getMonth(), str.getDate());
  const s = String(str).trim();
  const p = s.split("/");
  if (p.length === 3) {
    let y = parseInt(p[2]);
    if (y < 100) y += (y < 50 ? 2000 : 1900); // handle 2-digit years
    return new Date(y, parseInt(p[0])-1, parseInt(p[1]));
  }
  return null;
}
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function isSameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function toInputVal(d){
  // Use local date parts to avoid UTC timezone shift
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function datesBetween(s,e){ const o=[]; let c=new Date(s); while(c<=e){o.push(new Date(c));c=addDays(c,1);} return o; }
const DOW    = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

// ── RANGE ─────────────────────────────────────────────────────────
function initRange(){
  const t = new Date();
  rangeStart = new Date(t.getFullYear(), t.getMonth(), t.getDate());
  rangeEnd   = new Date(t.getFullYear()+1, t.getMonth(), t.getDate());
  document.getElementById("date-from").value = toInputVal(rangeStart);
  document.getElementById("date-to").value   = toInputVal(rangeEnd);
}
function readRange(){
  rangeStart = new Date(document.getElementById("date-from").value+"T00:00:00");
  rangeEnd   = new Date(document.getElementById("date-to").value  +"T00:00:00");
}
function shiftRange(days){ readRange(); rangeStart=addDays(rangeStart,days); rangeEnd=addDays(rangeEnd,days); document.getElementById("date-from").value=toInputVal(rangeStart); document.getElementById("date-to").value=toInputVal(rangeEnd); render(); }
function goToday(){
  initRange();
  render();
  // Scroll horizontally to center today in the viewport
  const wrap   = document.getElementById("gantt-wrap");
  const days   = datesBetween(rangeStart, rangeEnd);
  const today  = new Date();
  const idx    = days.findIndex(d => isSameDay(d, today));
  if (idx !== -1) {
    const cellW    = 48;
    const labelW   = 260;
    const visibleW = wrap.clientWidth - labelW;
    wrap.scrollTo({ left: Math.max(0, labelW + idx * cellW - visibleW / 2), behavior: "smooth" });
  }
}
document.getElementById("date-from").addEventListener("change",()=>{readRange();render();});
document.getElementById("date-to").addEventListener("change",  ()=>{readRange();render();});

// ── FETCH ─────────────────────────────────────────────────────────
async function fetchData(){
  try {
    const res  = await fetch(`${SCRIPT_URL}?token=${encodeURIComponent(SECRET_TOKEN)}`);
    const json = await res.text();
    if (json===lastJSON) return;
    lastJSON = json;
    const data = JSON.parse(json);
    if (data.error){ setStatus("error","Auth failed — check token"); return; }

    allEvents = data.map(r=>({
      name:     r["Event"]    || r["event"]    || "",
      category: (r["Category"]|| r["category"] || "").trim(),
      location: r["Location"] || r["location"] || "",
      notes:    r["Notes"]    || r["notes"]    || "",
      start:    parseDate(r["Start"]||r["start"]),
      end:      parseDate(r["End"]  ||r["end"]),
    })).filter(e=>e.start&&e.end&&e.name);

    // Sort by start date
    allEvents.sort((a,b)=>a.start-b.start);

    const cats = [...new Set(allEvents.map(e=>e.category||"__none__"))];
    if (activeCategories.size===0) cats.forEach(c=>activeCategories.add(c));
    buildCatFilters(cats);
    render();
    setStatus("ok",`Updated ${new Date().toLocaleTimeString()}`);
  } catch(err){
    setStatus("error","Fetch error — check URL");
    console.error(err);
  }
}
function setStatus(type,msg){
  document.getElementById("status-text").textContent=msg;
  document.getElementById("dot").style.background=type==="ok"?"#3ecf8e":type==="error"?"#ef4444":"#f59e0b";
}

// ── CATEGORY PILLS ────────────────────────────────────────────────
function buildCatFilters(cats){
  const wrap=document.getElementById("cat-filters");
  wrap.innerHTML="";
  cats.forEach(cat=>{
    const col=categoryColor(cat==="__none__"?"":cat);
    const lbl=cat==="__none__"?"Uncategorized":cat;
    const pill=document.createElement("div");
    pill.className="pill"+(activeCategories.has(cat)?" active":"");
    pill.textContent=lbl;
    pill.style.background=col.bg+"33";
    pill.style.color=col.bg;
    pill.style.borderColor=activeCategories.has(cat)?col.bg:"transparent";
    pill.addEventListener("click",()=>{
      if(activeCategories.has(cat)) activeCategories.delete(cat); else activeCategories.add(cat);
      buildCatFilters(cats); render();
    });
    wrap.appendChild(pill);
  });
}

// ── RENDER ────────────────────────────────────────────────────────
function render(){
  readRange();
  const gantt=document.getElementById("gantt");
  const msg=document.getElementById("message");
  const days=datesBetween(rangeStart,rangeEnd);
  const today=new Date();
  const cellW=48;

  const events=allEvents.filter(e=>{
    const k=e.category||"__none__";
    return activeCategories.has(k)&&e.start<=rangeEnd&&e.end>=rangeStart;
  });

  if(events.length===0){
    gantt.style.display="none"; msg.style.display="flex";
    msg.innerHTML=`<div class="big">📭</div>No events in this date range.<br/>Try adjusting the dates above.`;
    return;
  }

  gantt.style.display="grid"; msg.style.display="none"; gantt.innerHTML="";
  gantt.style.gridTemplateColumns=`var(--label-w) repeat(${days.length}, var(--cell-w))`;

  // Build month spans
  const monthSpans=[];
  let cur={month:days[0].getMonth(),year:days[0].getFullYear(),count:0};
  days.forEach(d=>{
    if(d.getMonth()===cur.month&&d.getFullYear()===cur.year){ cur.count++; }
    else{ monthSpans.push({...cur}); cur={month:d.getMonth(),year:d.getFullYear(),count:1}; }
  });
  monthSpans.push({...cur});

  // Month banner
  const mCorner=document.createElement("div"); mCorner.className="g-month-corner"; gantt.appendChild(mCorner);
  const mStrip=document.createElement("div"); mStrip.className="g-month-strip"; mStrip.style.gridColumn=`2 / span ${days.length}`;
  monthSpans.forEach(span=>{
    const block=document.createElement("div"); block.className="g-month-block";
    block.style.width=block.style.minWidth=(span.count*cellW)+"px";
    block.textContent=span.count>3?`${MONTHS[span.month]} ${span.year}`:MONTHS[span.month].slice(0,3);
    mStrip.appendChild(block);
  });
  gantt.appendChild(mStrip);

  // Day header
  const hLabel=document.createElement("div"); hLabel.className="g-header-label"; hLabel.textContent="EVENT"; gantt.appendChild(hLabel);
  const hDates=document.createElement("div"); hDates.className="g-header-dates"; hDates.style.gridColumn=`2 / span ${days.length}`;
  days.forEach(d=>{
    const isSun       = d.getDay()===0;
    const isMonthStart = d.getDate()===1;
    const cell=document.createElement("div");
    cell.className="g-day-header"+(isSameDay(d,today)?" today":"")+(isMonthStart?" month-start":isSun?" week-start":"");
    cell.innerHTML=`<span class="dow">${DOW[d.getDay()]}</span><span class="dom">${d.getDate()}</span>`;
    hDates.appendChild(cell);
  });
  gantt.appendChild(hDates);

  // Event rows
  events.forEach(ev=>{
    const col=categoryColor(ev.category);
    const label=document.createElement("div"); label.className="g-row-label";
    label.innerHTML=`<div class="cat-dot" style="background:${col.bg}"></div><div><div class="g-event-name">${ev.name}</div><div class="g-event-loc">${ev.location}</div></div>`;
    label.style.cursor="pointer";
    label.addEventListener("click", ()=>snapToEvent(ev, bar, label));
    gantt.appendChild(label);

    const rowCells=document.createElement("div"); rowCells.className="g-row-cells"; rowCells.style.gridColumn=`2 / span ${days.length}`;
    days.forEach(d=>{
      const isSun        = d.getDay()===0;
      const isMonthStart = d.getDate()===1;
      const cell=document.createElement("div");
      cell.className="g-cell"+(isSameDay(d,today)?" today":(d.getDay()===0||d.getDay()===6)?" weekend":"")+(isMonthStart?" month-start":isSun?" week-start":"");
      rowCells.appendChild(cell);
    });

    const cs=ev.start<rangeStart?rangeStart:ev.start;
    const ce=ev.end  >rangeEnd  ?rangeEnd  :ev.end;
    const si=days.findIndex(d=>isSameDay(d,cs)); const ei=days.findIndex(d=>isSameDay(d,ce));
    const s=si===-1?0:si; const e=ei===-1?days.length-1:ei;
    const barLeft=s*cellW+4; const barWidth=(e-s+1)*cellW-8;

    const bar=document.createElement("div"); bar.className="g-bar";
    bar.style.left=barLeft+"px"; bar.style.width=barWidth+"px";
    bar.style.background=col.bg; bar.style.color=col.text;
    // Always show name, clipped with ellipsis
    const barLbl=document.createElement("span"); barLbl.className="bar-label"; barLbl.textContent=ev.name;
    bar.appendChild(barLbl);
    bar.addEventListener("mouseenter",ev2=>showTooltip(ev2,ev,col));
    bar.addEventListener("mousemove", ev2=>moveTooltip(ev2));
    bar.addEventListener("mouseleave",hideTooltip);
    rowCells.appendChild(bar);
    gantt.appendChild(rowCells);
  });
}

// ── TOOLTIP ───────────────────────────────────────────────────────
const tt=document.getElementById("tooltip");
function showTooltip(e,ev,col){
  const fmt=d=>d?d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"—";
  tt.innerHTML=`<div class="tt-title" style="color:${col.bg}">${ev.name}</div><div class="tt-row">📍 <span>${ev.location||"—"}</span></div><div class="tt-row">🗓 <span>${fmt(ev.start)}${!isSameDay(ev.start,ev.end)?" → "+fmt(ev.end):""}</span></div><div class="tt-row">🏷 <span>${ev.category||"Uncategorized"}</span></div>${ev.notes?`<div class="tt-row">📝 <span>${ev.notes}</span></div>`:""}`;
  tt.classList.add("visible"); moveTooltip(e);
}
function moveTooltip(e){ tt.style.left=Math.min(e.clientX+14,window.innerWidth-280)+"px"; tt.style.top=Math.min(e.clientY+14,window.innerHeight-160)+"px"; }
function hideTooltip(){ tt.classList.remove("visible"); }

// ── SNAP TO EVENT ─────────────────────────────────────────────────
let selectedBar = null, selectedLabel = null;
function snapToEvent(ev, bar, label) {
  // Clear previous selection
  if (selectedBar)   { selectedBar.classList.remove("selected"); }
  if (selectedLabel) { selectedLabel.classList.remove("selected"); }

  // Highlight new selection
  bar.classList.add("selected");
  label.classList.add("selected");
  selectedBar   = bar;
  selectedLabel = label;

  // Scroll the gantt wrapper so the bar's start date is visible
  const wrap   = document.getElementById("gantt-wrap");
  const cellW  = 48;
  const days   = datesBetween(rangeStart, rangeEnd);
  const labelW = 260;

  // Find which column the event starts on (clamped to range)
  const snapDate = ev.start < rangeStart ? rangeStart : ev.start;
  const idx = days.findIndex(d => isSameDay(d, snapDate));
  if (idx === -1) return;

  // Find the end index to get bar center
  const snapEnd  = ev.end > rangeEnd ? rangeEnd : ev.end;
  const eidx     = days.findIndex(d => isSameDay(d, snapEnd));
  const endIdx   = eidx === -1 ? days.length - 1 : eidx;
  const barCenterCol = (idx + endIdx) / 2;

  // Center the bar horizontally in the visible gantt area (excluding label column)
  const visibleW       = wrap.clientWidth - labelW;
  const targetScrollLeft = labelW + barCenterCol * cellW - visibleW / 2;
  wrap.scrollTo({ left: Math.max(0, targetScrollLeft), behavior: "smooth" });

  // Center the row vertically in the visible gantt area
  const labelTop    = label.offsetTop;
  const labelHeight = label.offsetHeight;
  const visibleH    = wrap.clientHeight;
  const targetScrollTop = labelTop + labelHeight / 2 - visibleH / 2;
  wrap.scrollTo({ top: Math.max(0, targetScrollTop), behavior: "smooth" });

  // Combined scroll (some browsers need both axes at once)
  wrap.scrollTo({ left: Math.max(0, targetScrollLeft), top: Math.max(0, targetScrollTop), behavior: "smooth" });
}

// ── INIT ──────────────────────────────────────────────────────────
initRange();
fetchData();
setInterval(fetchData,POLL_MS);
</script>
