<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jack's Schedule</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:         #0f1117;
      --surface:    #1a1d27;
      --border:     #2a2d3a;
      --text:       #e8eaf0;
      --muted:      #6b7080;
      --accent:     #4f8ef7;
      --today-bg:   rgba(79,142,247,.15);
      --week-line:  rgba(255,255,255,.35);
      --month-line: rgba(79,142,247,.8);
      --row-h:      44px;
      --month-h:    42px;
      --month-bg:   #12192e;
      --header-h:   48px;
      --label-w:    260px;
      --cell-w:     48px;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { height:100%; overflow:hidden; }
    body {
      background:var(--bg); color:var(--text);
      font-family:'DM Sans',sans-serif; font-size:14px;
      display:flex; flex-direction:column;
    }

    /* ── TOP BAR ── */
    #topbar {
      flex-shrink:0; display:flex; align-items:center; justify-content:space-between;
      padding:0 28px; height:58px;
      border-bottom:1px solid var(--border); background:var(--surface);
    }
    #topbar h1 { font-size:16px; font-weight:600; }
    #status { font-size:12px; font-family:'DM Mono',monospace; color:var(--muted); display:flex; align-items:center; gap:8px; }
    #dot { width:7px; height:7px; border-radius:50%; background:#3ecf8e; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── CONTROLS ── */
    #controls {
      flex-shrink:0; display:flex; align-items:center; gap:12px;
      padding:12px 28px; border-bottom:1px solid var(--border); flex-wrap:wrap;
    }
    #controls label { font-size:12px; color:var(--muted); }
    #controls input[type=date] {
      background:var(--surface); border:1px solid var(--border); color:var(--text);
      border-radius:6px; padding:5px 10px; font-family:'DM Mono',monospace; font-size:12px;
    }
    .btn { background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:5px 14px; font-size:12px; cursor:pointer; transition:border-color .15s,background .15s; }
    .btn:hover { border-color:var(--accent); background:rgba(79,142,247,.08); }
    .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:500; }
    .btn.primary:hover { background:#3a7de8; }
    #cat-filters { display:flex; gap:6px; flex-wrap:wrap; margin-left:auto; }
    .pill { border-radius:999px; padding:3px 11px; font-size:11px; font-weight:500; cursor:pointer; border:1.5px solid transparent; opacity:.45; transition:opacity .15s; }
    .pill.active { opacity:1; }

    /* ── GANTT SCROLL CONTAINER ──
       Single scrollable div. Everything inside uses
       position:sticky to freeze the header rows and label column.
    ── */
    #gantt-wrap {
      flex:1; min-height:0;
      overflow:auto;
      position:relative;
    }

    /* The table itself — wide enough to fit all days */
    #gantt-table {
      display:inline-block;
      min-width:100%;
    }

    /* ── ROWS ── */
    .g-row {
      display:flex;
      min-width:max-content;
    }

    /* ── FROZEN LEFT CELL ──
       Every row has a left cell that sticks to left:0
    ── */
    .g-left {
      position:sticky;
      left:0;
      z-index:3;
      flex-shrink:0;
      width:var(--label-w);
      min-width:var(--label-w);
      background:var(--surface);
      border-right:1px solid var(--border);
    }

    /* ── FROZEN HEADER ROWS ──
       Month row and day row stick to top
    ── */
    .g-row.row-month { position:sticky; top:0; z-index:5; }
    .g-row.row-days  { position:sticky; top:var(--month-h); z-index:4; }

    /* The corner cell of the header is both sticky left AND sticky top */
    .g-row.row-month .g-left,
    .g-row.row-days  .g-left {
      z-index:6;
    }

    /* ── MONTH BANNER ── */
    .g-left.corner-month {
      height:var(--month-h);
      border-bottom:1px solid var(--border);
      background:var(--month-bg);
    }
    .month-strip {
      display:flex;
      height:var(--month-h);
      background:var(--month-bg);
      border-bottom:2px solid var(--month-line);
    }
    .month-block {
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0;
      border-left:3px solid var(--month-line);
      font-size:13px; font-weight:700; letter-spacing:.1em;
      text-transform:uppercase; color:var(--accent); overflow:hidden;
    }
    .month-block:first-child { border-left:none; }

    /* ── DAY HEADER ── */
    .g-left.corner-days {
      height:var(--header-h);
      display:flex; align-items:center; padding:0 16px;
      font-size:11px; font-weight:600; letter-spacing:.08em;
      text-transform:uppercase; color:var(--muted);
      border-bottom:1px solid var(--border);
    }
    .day-strip {
      display:flex;
      height:var(--header-h);
      background:var(--surface);
      border-bottom:1px solid var(--border);
    }
    .day-cell {
      width:var(--cell-w); min-width:var(--cell-w); flex-shrink:0;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      border-right:1px solid var(--border); gap:2px;
    }
    .day-cell.month-start { border-left:3px solid var(--month-line); }
    .day-cell.week-start  { border-left:3px solid var(--week-line); }
    .day-cell.today-col   { background:var(--today-bg); }
    .day-cell .dow { font-size:10px; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
    .day-cell .dom { font-size:15px; font-weight:600; font-family:'DM Mono',monospace; }
    .day-cell.today-col .dom { color:var(--accent); }

    /* ── EVENT ROWS ── */
    .g-left.ev-label {
      height:var(--row-h);
      display:flex; align-items:center; padding:0 16px; gap:10px;
      cursor:pointer; background:var(--bg);
      border-bottom:1px solid var(--border);
      transition:background .1s;
    }
    .g-left.ev-label:hover { background:var(--surface); }
    .g-left.ev-label.selected { background:var(--surface); outline:2px solid var(--accent); outline-offset:-2px; }
    .cat-dot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .ev-name  { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:190px; }
    .ev-loc   { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:190px; }

    .ev-cells {
      display:flex; flex:1; position:relative;
      height:var(--row-h);
      border-bottom:1px solid var(--border);
    }
    .ev-cell {
      width:var(--cell-w); min-width:var(--cell-w); flex-shrink:0;
      border-right:1px solid var(--border); height:100%;
    }
    .ev-cell.month-start { border-left:3px solid var(--month-line); }
    .ev-cell.week-start  { border-left:3px solid var(--week-line); }
    .ev-cell.today-col   { background:var(--today-bg); }
    .ev-cell.weekend     { background:rgba(255,255,255,.015); }

    /* ── BAR ── */
    .g-bar {
      position:absolute; top:7px; bottom:7px;
      border-radius:4px; display:flex; align-items:center;
      padding:0 8px; font-size:11px; font-weight:500;
      overflow:hidden; z-index:1; min-width:4px;
      transition:filter .15s,transform .1s,box-shadow .15s;
    }
    .g-bar:hover { filter:brightness(1.2); transform:scaleY(1.06); z-index:2; }
    .g-bar.selected { box-shadow:0 0 0 2px #fff,0 0 0 4px var(--accent); z-index:3; }
    .bar-label { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; width:100%; pointer-events:none; }

    /* ── TOOLTIP ── */
    #tooltip {
      position:fixed; background:#22263a; border:1px solid var(--border);
      border-radius:8px; padding:12px 16px; font-size:13px; max-width:260px;
      pointer-events:none; opacity:0; transition:opacity .15s;
      z-index:9999; box-shadow:0 8px 32px rgba(0,0,0,.4); line-height:1.6;
    }
    #tooltip.visible { opacity:1; }
    #tooltip .tt-title { font-weight:600; font-size:14px; margin-bottom:6px; }
    #tooltip .tt-row   { color:var(--muted); font-size:12px; }
    #tooltip .tt-row span { color:var(--text); }

    /* ── EMPTY STATE ── */
    #empty {
      display:none; flex-direction:column; align-items:center; justify-content:center;
      height:100%; gap:12px; color:var(--muted); font-size:14px; text-align:center; padding:40px;
    }
    #empty .big { font-size:36px; }

    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════
     CONFIGURATION — replace both values
══════════════════════════════════════ -->
<script>
  const SECRET_TOKEN = "jsschedule";  

const SCRIPT_URL  = "https://script.google.com/macros/s/AKfycbwn1u9aSHJ5jspUhaezKrgHZU6sGno07E6_dqVxbSem5TNqq0ZfdKfYS58Lst644XB9Nw/exec";
</script>
<!-- ══════════════════════════════════════ -->

<div id="topbar">
  <h1>🗓 Jack's Schedule</h1>
  <div id="status"><div id="dot"></div><span id="status-text">Connecting…</span></div>
</div>

<div id="controls">
  <label>From</label><input type="date" id="date-from"/>
  <label>To</label><input type="date" id="date-to"/>
  <button class="btn" onclick="shiftRange(-7)">◀ Week</button>
  <button class="btn" onclick="shiftRange(7)">Week ▶</button>
  <button class="btn primary" id="btn-today">Today</button>
  <div id="cat-filters"></div>
</div>

<div id="gantt-wrap">
  <div id="gantt-table">
    <div id="empty"><div class="big">⏳</div>Loading your schedule…</div>
  </div>
</div>
<div id="tooltip"></div>

<script>
// ── CATEGORY COLORS ──────────────────────────────────────────────
const CAT_COLORS = {
  "Internal": { bg:"#2563eb", text:"#fff" },
  "External": { bg:"#059669", text:"#fff" },
  "Personal": { bg:"#7c3aed", text:"#fff" },
  "Travel":   { bg:"#d97706", text:"#fff" },
  "Deadline": { bg:"#dc2626", text:"#fff" },
};
const AUTO_PAL = ["#0e7490","#be185d","#15803d","#b45309","#6d28d9","#0f766e","#9333ea","#c2410c","#1d4ed8","#047857"];
let autoIdx = 0;
function catColor(cat) {
  const k = (cat||"").trim();
  if (!k) { if (!CAT_COLORS["__"]) CAT_COLORS["__"]={bg:"#4b5563",text:"#fff"}; return CAT_COLORS["__"]; }
  if (!CAT_COLORS[k]) { CAT_COLORS[k]={bg:AUTO_PAL[autoIdx%AUTO_PAL.length],text:"#fff"}; autoIdx++; }
  return CAT_COLORS[k];
}

// ── CONSTANTS ────────────────────────────────────────────────────
const CELL_W  = 48;
const LABEL_W = 260;
const ROW_H   = 44;
const DOW     = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS  = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const POLL_MS = 10000;

// ── STATE ────────────────────────────────────────────────────────
let allEvents=[], activeCategories=new Set(), lastJSON="";
let rangeStart, rangeEnd;

// ── DATE HELPERS ─────────────────────────────────────────────────
function parseDate(v) {
  if (!v) return null;
  if (v instanceof Date) return new Date(v.getFullYear(),v.getMonth(),v.getDate());
  const p=String(v).trim().split("/");
  if (p.length===3) { let y=parseInt(p[2]); if(y<100)y+=y<50?2000:1900; return new Date(y,parseInt(p[0])-1,parseInt(p[1])); }
  return null;
}
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function sameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function toVal(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function daysBetween(s,e){ const a=[]; let c=new Date(s); while(c<=e){a.push(new Date(c));c=addDays(c,1);} return a; }

// ── RANGE ────────────────────────────────────────────────────────
function initRange(){
  const t=new Date();
  rangeStart=new Date(t.getFullYear(),t.getMonth(),t.getDate());
  rangeEnd  =new Date(t.getFullYear()+1,t.getMonth(),t.getDate());
  document.getElementById("date-from").value=toVal(rangeStart);
  document.getElementById("date-to").value  =toVal(rangeEnd);
}
function readRange(){
  rangeStart=new Date(document.getElementById("date-from").value+"T00:00:00");
  rangeEnd  =new Date(document.getElementById("date-to").value  +"T00:00:00");
}
function shiftRange(n){
  readRange();
  rangeStart=addDays(rangeStart,n); rangeEnd=addDays(rangeEnd,n);
  document.getElementById("date-from").value=toVal(rangeStart);
  document.getElementById("date-to").value  =toVal(rangeEnd);
  render();
}
document.getElementById("date-from").addEventListener("change",()=>{readRange();render();});
document.getElementById("date-to").addEventListener("change",  ()=>{readRange();render();});

document.getElementById("btn-today").addEventListener("click",()=>{
  initRange(); render();
  const wrap=document.getElementById("gantt-wrap");
  const days=daysBetween(rangeStart,rangeEnd);
  const idx=days.findIndex(d=>sameDay(d,new Date()));
  if(idx!==-1){
    wrap.scrollLeft=Math.max(0, idx*CELL_W - wrap.clientWidth/2 + CELL_W/2);
    wrap.scrollTop=0;
  }
});

// ── STATUS ───────────────────────────────────────────────────────
function setStatus(type,msg){
  document.getElementById("status-text").textContent=msg;
  document.getElementById("dot").style.background=type==="ok"?"#3ecf8e":type==="error"?"#ef4444":"#f59e0b";
}

// ── FETCH ────────────────────────────────────────────────────────
async function fetchData(){
  try{
    const res=await fetch(`${SCRIPT_URL}?token=${encodeURIComponent(SECRET_TOKEN)}`);
    const json=await res.text();
    if(json===lastJSON)return;
    lastJSON=json;
    const data=JSON.parse(json);
    if(data.error){setStatus("error","Auth failed — check token");return;}
    allEvents=data.map(r=>({
      name:    r["Event"]   ||r["event"]   ||"",
      category:(r["Category"]||r["category"]||"").trim(),
      location:r["Location"]||r["location"]||"",
      notes:   r["Notes"]  ||r["notes"]  ||"",
      start:   parseDate(r["Start"]||r["start"]),
      end:     parseDate(r["End"]  ||r["end"]),
    })).filter(e=>e.start&&e.end&&e.name);
    allEvents.sort((a,b)=>a.start-b.start);
    const cats=[...new Set(allEvents.map(e=>e.category||"__"))];
    if(activeCategories.size===0)cats.forEach(c=>activeCategories.add(c));
    buildPills(cats);
    render();
    setStatus("ok",`Updated ${new Date().toLocaleTimeString()}`);
  }catch(err){
    setStatus("error","Fetch error — check URL");
    console.error(err);
  }
}

// ── PILLS ────────────────────────────────────────────────────────
function buildPills(cats){
  const wrap=document.getElementById("cat-filters");
  wrap.innerHTML="";
  cats.forEach(cat=>{
    const col=catColor(cat==="__"?"":cat);
    const p=document.createElement("div");
    p.className="pill"+(activeCategories.has(cat)?" active":"");
    p.textContent=cat==="__"?"Uncategorized":cat;
    p.style.background=col.bg+"33"; p.style.color=col.bg;
    p.style.borderColor=activeCategories.has(cat)?col.bg:"transparent";
    p.addEventListener("click",()=>{
      if(activeCategories.has(cat))activeCategories.delete(cat);else activeCategories.add(cat);
      buildPills(cats);render();
    });
    wrap.appendChild(p);
  });
}

// ── RENDER ───────────────────────────────────────────────────────
function render(){
  readRange();
  const days  = daysBetween(rangeStart,rangeEnd);
  const today = new Date();
  const table = document.getElementById("gantt-table");
  const empty = document.getElementById("empty");
  table.innerHTML="";
  table.appendChild(empty);

  const events=allEvents.filter(e=>{
    const k=e.category||"__";
    return activeCategories.has(k)&&e.start<=rangeEnd&&e.end>=rangeStart;
  });

  if(events.length===0){
    empty.style.display="flex";
    empty.innerHTML=`<div class="big">📭</div>No events in this range.<br/>Try adjusting the dates above.`;
    return;
  }
  empty.style.display="none";

  // ── MONTH ROW ──
  const monthRow=document.createElement("div");
  monthRow.className="g-row row-month";

  const cornerMonth=document.createElement("div");
  cornerMonth.className="g-left corner-month";
  monthRow.appendChild(cornerMonth);

  const mStrip=document.createElement("div");
  mStrip.className="month-strip";
  const spans=[]; let cur={month:days[0].getMonth(),year:days[0].getFullYear(),count:0};
  days.forEach(d=>{
    if(d.getMonth()===cur.month&&d.getFullYear()===cur.year){cur.count++;}
    else{spans.push({...cur});cur={month:d.getMonth(),year:d.getFullYear(),count:1};}
  });
  spans.push({...cur});
  spans.forEach(sp=>{
    const b=document.createElement("div"); b.className="month-block";
    b.style.width=b.style.minWidth=(sp.count*CELL_W)+"px";
    const fullLabel=`${MONTHS[sp.month]} ${sp.year}`;
    const shortLabel=MONTHS[sp.month].slice(0,3);
    // For wide spans, repeat the label so it's always visible when scrolled
    if(sp.count>14){
      b.style.backgroundImage=`repeating-linear-gradient(90deg, transparent 0px, transparent ${CELL_W*14-1}px, transparent ${CELL_W*14}px)`;
      b.style.position="relative";
      b.style.overflow="hidden";
      // Use a CSS trick: display as sticky text inside the block
      b.innerHTML=`<span style="position:sticky;left:${LABEL_W}px;padding:0 16px;white-space:nowrap;">${fullLabel}</span>`;
    } else {
      b.textContent=sp.count>3?fullLabel:shortLabel;
    }
    mStrip.appendChild(b);
  });
  monthRow.appendChild(mStrip);
  table.appendChild(monthRow);

  // ── DAY ROW ──
  const dayRow=document.createElement("div");
  dayRow.className="g-row row-days";

  const cornerDays=document.createElement("div");
  cornerDays.className="g-left corner-days";
  cornerDays.textContent="EVENT";
  dayRow.appendChild(cornerDays);

  const dStrip=document.createElement("div");
  dStrip.className="day-strip";
  days.forEach(d=>{
    const isMo=d.getDate()===1, isWk=d.getDay()===0, isTd=sameDay(d,today);
    const c=document.createElement("div");
    c.className="day-cell"+(isTd?" today-col":"")+(isMo?" month-start":isWk?" week-start":"");
    c.innerHTML=`<span class="dow">${DOW[d.getDay()]}</span><span class="dom">${d.getDate()}</span>`;
    dStrip.appendChild(c);
  });
  dayRow.appendChild(dStrip);
  table.appendChild(dayRow);

  // ── EVENT ROWS ──
  let selBar=null, selLabel=null;

  events.forEach((ev,evIdx)=>{
    const col=catColor(ev.category);
    const row=document.createElement("div");
    row.className="g-row";

    // Frozen label cell
    const lbl=document.createElement("div");
    lbl.className="g-left ev-label";
    lbl.innerHTML=`<div class="cat-dot" style="background:${col.bg}"></div><div><div class="ev-name">${ev.name}</div><div class="ev-loc">${ev.location}</div></div>`;

    // Timeline cells + bar
    const cells=document.createElement("div");
    cells.className="ev-cells";
    days.forEach(d=>{
      const isMo=d.getDate()===1, isWk=d.getDay()===0;
      const isTd=sameDay(d,today), isWe=d.getDay()===0||d.getDay()===6;
      const c=document.createElement("div");
      c.className="ev-cell"+(isTd?" today-col":isWe?" weekend":"")+(isMo?" month-start":isWk?" week-start":"");
      cells.appendChild(c);
    });

    // Bar
    const cs=ev.start<rangeStart?rangeStart:ev.start;
    const ce=ev.end  >rangeEnd  ?rangeEnd  :ev.end;
    const si=days.findIndex(d=>sameDay(d,cs));
    const ei=days.findIndex(d=>sameDay(d,ce));
    const s=si===-1?0:si, e=ei===-1?days.length-1:ei;
    const bar=document.createElement("div"); bar.className="g-bar";
    bar.style.left      =(s*CELL_W+4)+"px";
    bar.style.width     =((e-s+1)*CELL_W-8)+"px";
    bar.style.background=col.bg; bar.style.color=col.text;
    const bl=document.createElement("span"); bl.className="bar-label"; bl.textContent=ev.name;
    bar.appendChild(bl);
    bar.addEventListener("mouseenter",ev2=>showTT(ev2,ev,col));
    bar.addEventListener("mousemove", ev2=>moveTT(ev2));
    bar.addEventListener("mouseleave",hideTT);
    cells.appendChild(bar);

    // Snap on label click
    lbl.addEventListener("click",()=>{
      if(selBar)   selBar.classList.remove("selected");
      if(selLabel) selLabel.classList.remove("selected");
      bar.classList.add("selected"); lbl.classList.add("selected");
      selBar=bar; selLabel=lbl;

      const wrap=document.getElementById("gantt-wrap");
      const barCenterX=(s+(e-s)/2)*CELL_W+CELL_W/2;
      const visW=wrap.clientWidth-LABEL_W;
      wrap.scrollLeft=Math.max(0, barCenterX-visW/2);

      const rowTop=evIdx*ROW_H;
      const visH=wrap.clientHeight;
      wrap.scrollTop=Math.max(0, rowTop-visH/2+ROW_H/2);
    });

    row.appendChild(lbl);
    row.appendChild(cells);
    table.appendChild(row);
  });
}

// ── TOOLTIP ──────────────────────────────────────────────────────
const tt=document.getElementById("tooltip");
function showTT(e,ev,col){
  const fmt=d=>d?d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"—";
  tt.innerHTML=`<div class="tt-title" style="color:${col.bg}">${ev.name}</div><div class="tt-row">📍 <span>${ev.location||"—"}</span></div><div class="tt-row">🗓 <span>${fmt(ev.start)}${!sameDay(ev.start,ev.end)?" → "+fmt(ev.end):""}</span></div><div class="tt-row">🏷 <span>${ev.category||"Uncategorized"}</span></div>${ev.notes?`<div class="tt-row">📝 <span>${ev.notes}</span></div>`:""}`;
  tt.classList.add("visible"); moveTT(e);
}
function moveTT(e){ tt.style.left=Math.min(e.clientX+14,window.innerWidth-280)+"px"; tt.style.top=Math.min(e.clientY+14,window.innerHeight-160)+"px"; }
function hideTT(){ tt.classList.remove("visible"); }

// ── INIT ─────────────────────────────────────────────────────────
initRange();
fetchData();
setInterval(fetchData,POLL_MS);
</script>
</body>
